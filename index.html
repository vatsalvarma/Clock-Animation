<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Circle Animation</title>

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* MAIN CONTAINER */
        .container {
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* LEFT SIDE TEXT */
        .left {
            position: absolute;
            left: 280px;
            top: 50%;
            transform: translateY(-50%);
        }

        .count {
            font-size: 40px;
            color: #111;
            opacity: 0.8;
        }

        .small {
            font-size: 18px;
            margin-top: 20px;
            color: #999;
        }

        /* RIGHT TEXT */
        .right {
            position: absolute;
            right: 100px;
            top: 50%;
            transform: translateY(-50%);
            max-width: 250px;
        }

        .title {
            font-size: 26px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 14px;
            color: #777;
        }

        /* CENTER LINE */
        .line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 0;
            background: #222;
            transform-origin: top;
            z-index:3;
            animation: growLine 1s ease forwards;
        }

        /* CIRCLE */
        .circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            overflow: hidden;
            transform: translate(-50%, -50%);
            background: #ddd;
            animation: expandCircle 1s ease forwards 1s;
        }

        /* IMAGE */
        .circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ROTATING ARM */
       .arm {
    position: absolute;
    width: 2px;
    height: 150px;
    background: #222;

    top: 50%;
    left: 50%;

    transform-origin: bottom; /* pivot at center */
    transform: translate(-50%, -100%) rotate(180deg);

    transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);

}

.circle::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: #222;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

        /* ANIMATIONS */
        @keyframes growLine {
            to {
                height: 200px;
            }
        }

        @keyframes expandCircle {
            to {
                width: 300px;
                height: 300px;
            }
        }

/* TEXT ANIMATION BASE */
/* RESET BASE */
.title, .desc, .count {
    opacity: 1;
    transform: translateY(0);
}

/* OUT (go up) */
.text-out {
    animation: textOut 0.9s cubic-bezier(0.77, 0, 0.175, 1) forwards;
}

/* IN (come from down) */
.text-in {
    animation: textIn 0.9s cubic-bezier(0.77, 0, 0.175, 1) forwards;
}

/* KEYFRAMES */
@keyframes textOut {
    0% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
    }
    100% {
        opacity: 0;
        transform: translateY(-60px);
        filter: blur(0);
    }
}

@keyframes textIn {
    0% {
        opacity: 0;
        transform: translateY(60px);
        filter: blur(0);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
    }
}

    </style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="count" id="count">01</div>
        <div class="small">Best of the Month</div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="title" id="title">Oasis Retreat</div>
        <div class="desc" id="desc">Provence, France Check-in made simple. Smooth communication with Hosts for a worry-free arrival. Find homes perfect for any, nearby getaways, long term stays & more! Over</div>
    </div>

    <!-- CENTER LINE -->
    <div class="line"></div>

    <!-- CIRCLE -->
    <div class="circle">
        <img id="image" src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
    </div>

    <!-- ROTATING ARM -->
    <div class="arm" id="arm"></div>

</div>

<script>
    const data = [
        {
            title: "Oasis Retreat",
            desc: "Provence, France Check-in made simple. Smooth communication with Hosts for a worry-free arrival. for any trip: vacations, nearby getaways, long term stays & more! Over",
            img: "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"
        },
        {
            title: "Cliff House",
            desc: "California, USA Check-in made simple. Smooth communication with Hosts for a worry-free arrival. for any trip: vacations, nearby getaways, long term stays & more! Over",
            img: "https://images.unsplash.com/photo-1493809842364-78817add7ffb"
        },
        {
            title: "Modern Escape",
            desc: "Swiss Alps Check-in made simple. Smooth communication with Hosts for a worry-free arrival. Find homes perfect for any trip: vacations, long term stays & more! Over",
            img: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688"
        }
    ];

    let index = 0;
    let angle = 180;

    const arm = document.getElementById("arm");
    const title = document.getElementById("title");
    const desc = document.getElementById("desc");
    const img = document.getElementById("image");
    const count = document.getElementById("count");

  function resetAnimation(el) {
    el.classList.remove("text-in", "text-out");
    void el.offsetWidth; // 🔥 force reflow (this is the key fix)
}

function animateTextChange() {

    // STEP 1: OUT animation (go up)
    title.classList.add("text-out");
    desc.classList.add("text-out");
    count.classList.add("text-out");

    setTimeout(() => {

        // STEP 2: CHANGE CONTENT
        title.innerText = data[index].title;
        desc.innerText = data[index].desc;
        img.src = data[index].img;
        count.innerText = "0" + (index + 1);

        // STEP 3: RESET animation state
        resetAnimation(title);
        resetAnimation(desc);
        resetAnimation(count);

        // STEP 4: IN animation (from down)
        title.classList.add("text-in");
        desc.classList.add("text-in");
        count.classList.add("text-in");

    }, 450);
}

function rotate() {
    index = (index + 1) % data.length;
    angle += 360;

    arm.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;

    animateTextChange();
}

    setInterval(rotate, 3000);
</script>

</body>
</html>
